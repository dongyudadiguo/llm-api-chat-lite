<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Chat Lite</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{color-scheme:dark;--bg:#09090b;--s:#18181b;--s2:#1e1e22;--s3:#27272a;--b:#27272a;--t:#fafafa;--t2:#a1a1aa;--t3:#52525b;--a:#3b82f6;--a2:#2563eb;--d:#ef4444;--f:-apple-system,system-ui,sans-serif;--m:'JetBrains Mono',Menlo,Consolas,monospace;--ch:240px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--f);background:var(--bg);color:var(--t);font-size:15px;line-height:1.5}
body{overflow:hidden}
button,input,textarea,select{font:inherit;color:inherit}button{cursor:pointer;border:none;background:none}
.sb{position:fixed;left:0;top:0;bottom:0;width:260px;background:var(--s);border-right:1px solid var(--b);display:flex;flex-direction:column;z-index:100;transform:translateX(-100%);transition:transform .2s}
.sb.open{transform:translateX(0)}
.sb-h{padding:16px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}
.sb-h h3{font-size:14px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--t2)}
.sb-b{flex:1;overflow-y:auto;padding:8px}
.sb-b::-webkit-scrollbar{width:3px}.sb-b::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}
.sb-f{padding:12px;border-top:1px solid var(--b)}
.cnv{padding:10px 12px;border-radius:8px;cursor:pointer;display:flex;flex-direction:column;gap:2px;margin-bottom:2px}
.cnv:hover{background:var(--s2)}.cnv.on{background:#172554}
.cnv .tl{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cnv .mt{font-size:12px;color:var(--t3);display:flex;justify-content:space-between}
.cnv .ac{display:flex;gap:4px;margin-top:4px;opacity:0;pointer-events:none}
.cnv:hover .ac{opacity:1;pointer-events:auto}
.cnv .ac button{font-size:12px;padding:2px 8px;border-radius:4px;background:var(--s3);color:var(--t2);border:1px solid var(--b)}
.cnv .ac button:hover{background:var(--b);color:var(--t)}
.cnv .ac button.x:hover{background:#2a1215;color:var(--d);border-color:#3a1a1e}
.btn-full{width:100%;padding:8px;border-radius:8px;background:var(--s2);border:1px solid var(--b);color:var(--t2);font-size:14px}
.btn-full:hover{background:var(--s3);color:var(--t)}
.fab{width:36px;height:36px;display:grid;place-items:center;border-radius:10px;font-size:15px;color:var(--t3);background:rgba(24,24,27,.75);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.05)}
.fab:hover{background:rgba(39,39,42,.85);color:var(--t2)}
.fab-l{position:fixed;top:12px;left:12px;z-index:50}
.fab-r{position:fixed;top:12px;right:12px;display:flex;gap:4px;z-index:50}
.pill{position:fixed;top:54px;left:12px;max-width:min(320px,calc(100% - 140px));padding:4px 10px;border-radius:6px;background:rgba(24,24,27,.6);backdrop-filter:blur(8px);font-size:12px;color:var(--t3);z-index:50;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msgs{position:fixed;inset:0;overflow-y:auto;padding:68px 12px 156px}
.msgs::-webkit-scrollbar{width:5px}.msgs::-webkit-scrollbar-thumb{background:var(--b);border-radius:3px}
.stack{width:min(760px,100%);margin:0 auto;display:flex;flex-direction:column;gap:24px}
.empty{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.empty h2{font-size:20px;font-weight:600}
.empty p{font-size:14px;color:var(--t3);text-align:center;max-width:320px;line-height:1.7}
.chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px}
.chip{padding:7px 14px;border-radius:8px;background:var(--s);border:1px solid var(--b);color:var(--t2);font-size:14px}
.chip:hover{background:var(--s2);color:var(--t)}
.msg{display:flex;flex-direction:column;gap:6px}
.msg-hd{display:flex;align-items:center;gap:8px}
.msg-av{width:20px;height:20px;border-radius:5px;display:grid;place-items:center;font-size:10px;font-weight:700}
.msg.u .msg-av{background:#172554;color:#60a5fa}
.msg.a .msg-av{background:var(--s2);color:var(--t3)}
.msg-nm{font-size:13px;font-weight:600;color:var(--t2)}
.msg-tm{font-size:12px;color:var(--t3);margin-left:auto}
.msg-pf{font-size:12px;color:#3f6f3f;margin-left:6px}
.msg-bd{padding:10px 14px;border-radius:10px;line-height:1.75;word-break:break-word;position:relative}
.msg.u .msg-bd{background:var(--s);border:1px solid var(--b)}
.msg.a .msg-bd{background:none;padding-left:28px}
.msg.err .msg-bd{background:#1c1113;border:1px solid #2a1518;color:#d4a0a0}
.tbd{padding:4px 14px!important;font-size:13px!important;color:var(--t3)!important;background:none!important;border:none!important}
.msg-hide{font-size:12px;color:var(--t3);background:none;border:none;cursor:pointer;padding:1px 6px;border-radius:4px;opacity:0}
.msg:hover .msg-hide{opacity:1}.msg-hide:hover{color:var(--t2);background:var(--s2)}
.hi{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:8px;background:rgba(255,255,255,.02);border:1px dashed var(--b);font-size:13px;color:var(--t3)}
.hi span{flex:1}
.hi button{color:var(--a);background:none;border:none;font-size:12px;cursor:pointer;padding:2px 8px;border-radius:4px}
.hi button:hover{background:var(--s2);color:var(--t)}
.msg-bd.collapsed{max-height:var(--ch);overflow:hidden}
.msg.u .msg-bd.collapsed::after{content:'';position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,var(--s));pointer-events:none;border-radius:0 0 10px 10px}
.clp{display:inline-block;padding:3px 0;margin-top:2px;font-size:13px;font-weight:500;color:var(--a);background:none;border:none;cursor:pointer}
.clp:hover{color:var(--t);text-decoration:underline}
.typing{display:flex;gap:5px;align-items:center;padding-left:28px}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--t3);animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}
@keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}
.comp{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);width:min(800px,calc(100% - 24px));z-index:50;background:rgba(18,18,21,.82);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.05);border-radius:12px;overflow:hidden;transition:opacity .2s,transform .2s,visibility .2s}
.comp.off{opacity:0;transform:translateX(-50%) translateY(8px);visibility:hidden;pointer-events:none}
.comp textarea{width:100%;min-height:44px;max-height:180px;padding:13px 16px 4px;border:none;outline:none;background:transparent;resize:none;font-size:15px;line-height:1.6;color:var(--t)}
.comp textarea::placeholder{color:var(--t3)}
.c-bar{display:flex;align-items:center;justify-content:space-between;padding:4px 10px 10px}
.c-info{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:12px;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,.04);color:var(--t3);font-weight:500}
.btn-s{padding:6px 18px;border-radius:8px;font-size:14px;font-weight:600;background:var(--a);color:#fff}
.btn-s:hover{background:var(--a2)}.btn-s.stop{background:var(--d)}.btn-s.stop:hover{background:#dc2626}
.msg-bd p,.msg-bd ul,.msg-bd ol,.msg-bd h1,.msg-bd h2,.msg-bd h3,.msg-bd blockquote,.msg-bd table,.msg-bd hr{margin:0 0 10px}
.msg-bd>:last-child{margin-bottom:0}
.msg-bd ul,.msg-bd ol{padding-left:20px}
.msg-bd blockquote{padding:8px 12px;border-left:3px solid var(--a);background:var(--s);border-radius:0 8px 8px 0}
.msg-bd h1{font-size:17px;font-weight:600}.msg-bd h2{font-size:16px;font-weight:600}.msg-bd h3{font-size:15px;font-weight:600}
.msg-bd code{font-family:var(--m);font-size:.88em;padding:1px 5px;border-radius:4px;background:rgba(255,255,255,.04)}
.msg-bd a{color:var(--a)}
.msg-bd table{width:100%;border-collapse:collapse;font-size:14px;line-height:1.6}
.msg-bd thead th{text-align:left;padding:8px 12px;background:var(--s2);border:1px solid var(--b);font-weight:600;color:var(--t2);white-space:nowrap}
.msg-bd tbody td{padding:7px 12px;border:1px solid var(--b);color:var(--t)}
.msg-bd tbody tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.msg-bd hr{border:none;height:1px;background:var(--b)}
.cb{position:relative;margin:0 0 10px}
.cb pre{margin:0;padding:14px;font-family:var(--m);font-size:13px;line-height:1.6;color:var(--t);overflow-x:auto}
.cb pre code{padding:0;background:none;font-size:13px;border-radius:0;display:block}
.cb[data-monaco] pre{display:none}
.cb .cb-tools{position:absolute;top:6px;right:8px;display:flex;gap:4px;align-items:center;opacity:0;transition:opacity .15s;z-index:20}
.cb:hover .cb-tools{opacity:1}
.cb .cb-tools button{font-size:12px;padding:3px 10px;border-radius:5px;background:rgba(39,39,42,.85);backdrop-filter:blur(8px);color:var(--t2);border:1px solid rgba(255,255,255,.08);cursor:pointer;transition:background .1s,color .1s}
.cb .cb-tools button:hover{background:rgba(63,63,70,.9);color:var(--t)}
.cb .cb-tools .cb-lang{font-size:12px;font-weight:600;color:var(--t3);letter-spacing:.03em;text-transform:uppercase;pointer-events:none;padding-right:4px}
.cb.nolang .cb-lang{display:none}
.cb .monaco-editor{border:none!important}
.cb .monaco-editor,.cb .monaco-editor .margin,.cb .monaco-editor-background{background:transparent!important}
.cb[data-monaco] .monaco-fade{position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent 0%,#09090b 100%);pointer-events:none;z-index:10;border-radius:0 0 8px 8px}
.msg.pending .cb pre::after{content:'￮';color:var(--a);animation:cblink 1s step-end infinite;margin-left:1px}
@keyframes cblink{0%,100%{opacity:1}50%{opacity:0}}
.mm{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);display:grid;place-items:center;padding:20px}
.mm.off{display:none}
.modal{background:var(--s);border:1px solid var(--b);border-radius:12px;width:min(620px,100%);max-height:85vh;overflow-y:auto}
.modal::-webkit-scrollbar{width:3px}.modal::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}
.mh{padding:20px 24px 0;display:flex;align-items:flex-start;justify-content:space-between}
.mh h2{font-size:16px;font-weight:600}.mh p{font-size:13px;color:var(--t3);margin-top:3px}
.mb{padding:20px 24px}
.mf{padding:14px 24px;border-top:1px solid var(--b);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ff{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:13px;font-weight:600;color:var(--t2)}
.hint{font-size:12px;color:var(--t3);margin-top:2px;line-height:1.6}
.hint code{background:var(--bg);padding:1px 4px;border-radius:3px;font-family:var(--m);font-size:12px}
.ti,.ts,.ta{width:100%;padding:8px 11px;background:var(--s2);border:1px solid var(--b);border-radius:8px;color:var(--t);font-size:14px}
.ti:focus,.ts:focus,.ta:focus{outline:none;border-color:var(--a)}
.ti::placeholder,.ta::placeholder{color:var(--t3)}
.ts{appearance:none}.ta{min-height:76px;resize:vertical;line-height:1.6}
.fr{display:flex;gap:8px;align-items:center}.fr .ti,.fr .ts{flex:1}
.sw-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.sw{width:34px;height:18px;border-radius:9px;background:var(--s3);border:1px solid var(--b);position:relative;cursor:pointer;appearance:none;-webkit-appearance:none}
.sw::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--t3);transition:all .15s}
.sw:checked{background:var(--a);border-color:var(--a)}.sw:checked::after{left:18px;background:#fff}
.btn{padding:7px 14px;border-radius:8px;font-size:14px;font-weight:500;background:var(--s2);border:1px solid var(--b);color:var(--t2)}
.btn:hover{background:var(--s3);color:var(--t)}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:var(--a);color:#fff;border-color:var(--a)}.btn-p:hover{background:var(--a2)}
.btn-d{color:var(--d)}.btn-d:hover{background:#1c1113}
@media(max-width:768px){.sb{width:280px}.comp{width:calc(100% - 16px)}.msgs{padding:64px 8px 148px}.fg{grid-template-columns:1fr}.pill{max-width:180px}:root{--ch:200px}}
</style>
</head>
<body>
<div class="sb" id="sb">
<div class="sb-h"><h3>对话</h3><button class="fab" id="sbX" style="width:28px;height:28px;font-size:12px">✕</button></div>
<div class="sb-b" id="convList"></div>
<div class="sb-f"><button class="btn-full" id="newConvBtn">+ 新建</button></div>
</div>
<button class="fab fab-l" id="menuBtn">☰</button>
<div class="fab-r">
<button class="fab" id="syncBtn">☁</button>
<button class="fab" id="setBtn">⚙</button>
<button class="fab" id="newBtn" style="font-size:18px;font-weight:300">+</button>
</div>
<div class="pill" id="status">就绪</div>
<div class="msgs" id="messages"></div>
<form class="comp" id="form" autocomplete="off">
<textarea id="prompt" rows="1" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
<div class="c-bar">
<div class="c-info"><span class="tag" id="pInfo">默认</span><span class="tag" id="mInfo">未配置</span></div>
<button class="btn-s" id="sendBtn">发送</button>
</div>
</form>
<div class="mm off" id="mask"><div class="modal">
<div class="mh"><div><h2>设置</h2></div><button class="fab" id="maskX" style="width:28px;height:28px;font-size:12px">✕</button></div>
<div class="mb"><div class="fg">
<div class="ff"><div class="field"><label>方案</label><div class="fr"><select id="pSel" class="ts"></select><button class="btn" id="pNew">新建</button><button class="btn btn-d" id="pDel">删除</button></div></div></div>
<div class="ff"><div class="field"><label>名称</label><input id="pName" class="ti"></div></div>
<div class="ff"><div class="field"><label>接口地址</label><input id="pUrl" class="ti" placeholder="https://api.openai.com/v1"></div></div>
<div class="field"><label>API Key</label><input id="pKey" class="ti" type="password" placeholder="sk-..."></div>
<div class="field"><label>模型</label><input id="pModel" class="ti" placeholder="gpt-4.1-mini"></div>
<div class="ff"><div class="field"><label>系统提示词</label><textarea id="pSys" class="ta" placeholder="你是一个专业、准确、简洁的 AI 助手。"></textarea></div></div>
<div class="field"><label>Temperature</label><input id="pTemp" class="ti" type="number" min="0" max="2" step="0.1"></div>
</div></div>
<div class="mf"><span class="hint">部分 API 需要后端代理</span><div style="display:flex;gap:8px"><button class="btn" id="maskC">取消</button><button class="btn btn-p" id="maskS">保存</button></div></div>
</div></div>
<div class="mm off" id="syncMask"><div class="modal" style="max-width:420px">
<div class="mh"><div><h2>云同步</h2><p>通过 GitHub Gist 自动同步</p></div><button class="fab" id="syncX" style="width:28px;height:28px;font-size:12px">✕</button></div>
<div class="mb">
<div class="field"><label>GitHub Token</label><input id="sToken" class="ti" type="password" placeholder="ghp_xxxx..."><span class="hint">Personal access tokens，勾选 <code>gist</code>，填写后自动生效</span></div>
<div class="sw-row"><span>同步状态</span><span id="sStat" class="tag">未配置</span></div>
</div>
<div class="mf"><span class="hint">Token 仅保存在本地</span><div style="display:flex;gap:8px"><button class="btn" id="syncC">关闭</button></div></div>
</div></div>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script>
var monacoReady=false;
require.config({paths:{vs:'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs'}});
require(['vs/editor/editor.main'],function(){
  monaco.editor.defineTheme('chat-dark',{base:'vs-dark',inherit:true,rules:[],colors:{
    'editor.background':'#09090b','editorGutter.background':'#09090b',
    'editor.lineHighlightBackground':'#09090b','editor.selectionBackground':'#264f7833'}});
  monacoReady=true;initAllCB();
});
function mapLang(l){var m={js:'javascript',ts:'typescript',py:'python',rb:'ruby',rs:'rust',sh:'shell',bash:'shell',zsh:'shell',yml:'yaml',md:'markdown',cs:'csharp',kt:'kotlin',vue:'html',dockerfile:'dockerfile'};return m[(l||'').toLowerCase()]||l||'plaintext'}
function initCB(el){
  if(el.dataset.monaco)return;
  var pre=el.querySelector('pre');if(!pre)return;
  var text=pre.textContent.replace(/\n$/,'');
  var lang=el.dataset.lang||'';
  el.dataset.monaco='done';pre.style.display='none';
  var ediv=document.createElement('div');
  ediv.style.height=Math.min(text.split('\n').length*18+16,400)+'px';
  el.appendChild(ediv);
  var totalH=text.split('\n').length*18+16;
  if(totalH>400){var fade=document.createElement('div');fade.className='monaco-fade';el.appendChild(fade)}
  try{monaco.editor.create(ediv,{value:text,language:mapLang(lang),theme:'chat-dark',readOnly:true,domReadOnly:true,minimap:{enabled:false},scrollBeyondLastLine:false,lineNumbers:'off',folding:false,wordWrap:'on',fontSize:13,fontFamily:"'JetBrains Mono',Menlo,Consolas,'Courier New',monospace",fontLigatures:true,scrollbar:{vertical:'auto',horizontal:'auto',verticalScrollbarSize:6,horizontalScrollbarSize:6},overviewRulerLanes:0,hideCursorInOverviewRuler:true,overviewRulerBorder:false,renderLineHighlight:'none',contextmenu:false,padding:{top:8,bottom:8},lineDecorationsWidth:0,lineNumbersMinChars:0,automaticLayout:true,renderIndentGuides:true,guides:{indentation:true,bracketPairs:false}});}
  catch(e){pre.style.display='';ediv.remove();el.dataset.monaco='';}
}
function initAllCB(){if(!monacoReady)return;document.querySelectorAll('.msg:not(.pending) .cb:not([data-monaco])').forEach(initCB)}

function renderMd(t){
  var raw=String(t||'').replace(/\r/g,'').split('\n'),out=[],i=0;
  while(i<raw.length){
    if(/^```/.test(raw[i])){
      var lang=raw[i].slice(3).trim(),lines=[];i++;
      while(i<raw.length&&!/^```/.test(raw[i])){lines.push(raw[i]);i++;}
      if(i<raw.length)i++;
      var src=lines.join('\n').replace(/^\n+|\n+$/g,'');
      var l=/^[a-zA-Z0-9_+#.\-]{1,24}$/.test(lang)?lang:'';
      out.push('<div class="cb'+(l?'':' nolang')+'" data-lang="'+esc(l)+'"><span class="cb-tools"><span class="cb-lang">'+esc(l)+'</span><button class="cb-cp">复制</button><button class="cb-dl">下载</button></span><pre><code>'+esc(src)+'</code></pre></div>');
      continue;
    }
    if(/^\|.+\|$/.test((raw[i]||'').trim())){
      var tl=[];while(i<raw.length&&/^\|.+\|$/.test((raw[i]||'').trim())){tl.push(raw[i]);i++;}
      out.push(bldTbl(tl));continue;
    }
    var tl=[];while(i<raw.length&&!/^```/.test(raw[i])&&!/^\|.+\|$/.test((raw[i]||'').trim())){tl.push(raw[i]);i++;}
    if(tl.length)out.push(tB(tl.join('\n')));
  }
  return out.join('')||'<p></p>';
}
function bldTbl(lines){
  var rows=lines.map(function(l){var s=l.trim().replace(/^\|/,'').replace(/\|$/,'');return s.split('|').map(function(c){return c.trim();});});
  var si=-1;for(var i=0;i<rows.length;i++){if(rows[i].every(function(c){return/^[-:]+$/.test(c);}))si=i;}
  var al=[];if(si>=0)al=rows[si].map(function(c){return c.startsWith(':')&&c.endsWith(':')?'center':c.endsWith(':')?'right':'left';});
  var h='<table>';
  if(si>=0){h+='<thead><tr>';rows[0].forEach(function(c,ci){h+='<th'+(al[ci]?' style="text-align:'+al[ci]+'"':'')+'>'+inline(c)+'</th>';});h+='</tr></thead>';}
  var bs=rows.slice(si>=0?si+1:0);

function tB(t){

  for(var ii=0;ii<lines.length;ii++){

    catch(e){if(e.name==='AbortError')throw e;return{id:t.id,name:t.function.name,content:'获取失败: '+e.message,error:true,url:turl}}}));
  var tms=[];
  for(var ri=0;ri<results.length;ri++){var r=results[ri];var sm=sms.find(function(m){return m.toolCallId===r.id});
    if(sm){sm.pending=false;sm.error=r.error;var d=extractDomain(r.url);sm.content=r.error?'❌ '+d+' 失败':'✅ 已读取 '+d}
    tms.push({id:'m_'+uid(),role:'tool',content:r.content.slice(0,8000),time:new Date().toISOString(),pending:false,error:false,toolCallId:r.id,toolName:r.name,toolCalls:null,toolUrl:null,hidden:false})}
  idx=c.messages.indexOf(ai);c.messages.splice(idx,0,...tms);render({scroll:true});
}

function extractDomain(u){try{var p=new URL(u);return p.hostname+p.pathname.replace(/\/$/,'').slice(0,40)}catch(e){return u}}
function extractTC(json){var c=json?.choices?.[0];return c?.message?.tool_calls?.map(function(t){return{id:t.id,type:t.type||'function',function:{name:t.function.name,arguments:t.function.arguments}}})||[]}
function buildMsgs(c,pi){var out=[];if(S.s.systemPrompt)out.push({role:'system',content:S.s.systemPrompt});
  c.messages.forEach(function(m){if(m.id===pi.id||m.pending||m.role==='tool_status'||m.hidden)return;
    if(m.role==='assistant'&&m.toolCalls?.length)out.push({role:'assistant',content:m.content||null,tool_calls:m.toolCalls});
    else if(m.role==='tool')out.push({role:'tool',tool_call_id:m.toolCallId,content:m.content});
    else out.push({role:m.role,content:m.content})});return out}
function ep(){var c=(S.s?.baseUrl||'').trim().replace(/\/+$/,'');if(!c)return'';if(/\/chat\/completions$/i.test(c))return c;if(/\/v1$/i.test(c))return c+'/chat/completions';return c+'/v1/chat/completions'}

async function rSSE(res,tCb,tcCb){var rd=res.body.getReader(),dec=new TextDecoder(),buf='';
  while(true){var r=await rd.read();if(r.done)break;buf+=dec.decode(r.value,{stream:true}).replace(/\r\n/g,'\n');var i;while((i=buf.indexOf('\n\n'))!==-1){procSSE(buf.slice(0,i),tCb,tcCb);buf=buf.slice(i+2)}}
  if(buf.trim())procSSE(buf,tCb,tcCb)}
function procSSE(ev,tCb,tcCb){ev.split('\n').forEach(function(ln){if(!ln.startsWith('data:'))return;var t=ln.slice(5).trim();if(!t||t==='[DONE]')return;
  try{var j=JSON.parse(t),c=j.choices?.[0];if(c?.delta?.content)tCb(c.delta.content);if(c?.delta?.tool_calls)c.delta.tool_calls.forEach(function(tc){tcCb(tc)})}catch(e){}})}

async function genTitle(c){if(!S.s?.baseUrl||!S.s?.apiKey)return;try{var um=c.messages.filter(function(m){return m.role==='user'&&!m.hidden}).slice(0,2).map(function(m){return m.content}).join('\n');
  var r=await fetch(ep(),{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+S.s.apiKey},body:JSON.stringify({model:S.s.model,messages:[{role:'system',content:'用不超过15个字概括对话主题，只输出标题'},{role:'user',content:um}],temperature:.7,max_tokens:30,stream:false})});
  if(!r.ok)return;var j=await r.json();var t=j.choices?.[0]?.message?.content?.trim();
  if(t){c.title=t.slice(0,20);c.titleGenerated=true;c.updatedAt=new Date().toISOString();persistConv();renderConv()}}catch(e){}}

function render(opts){
  opts=opts||{};var c=aConv(),msgs=c?c.messages:[],el=U.msgs,prevH=el.scrollHeight,parts=[],i=0;
  while(i<msgs.length){var m=msgs[i];
    if(m.hidden){var cnt=0,from=m.id,j=i;while(j<msgs.length&&msgs[j].hidden){if(msgs[j].role==='user')cnt++;j++}i=j;
      parts.push('<div class="hi"><span>⋯ '+cnt+' 对问答已隐藏</span><button class="sh-btn" data-from="'+from+'">显示</button><button class="sa-btn">全部显示</button></div>');continue}
    if(m.role==='tool'||(m.role==='assistant'&&m.toolCalls?.length&&!m.content?.trim())){i++;continue}
    parts.push(vMsg(m));i++}
  el.innerHTML=parts.length?'<div class="stack">'+parts.join('')+'</div>':emptyH();
  applyCollapse();initAllCB();
  if(opts.scroll||ascroll){el.scrollTop=el.scrollHeight;ascroll=true}else{void el.scrollHeight;sst+=el.scrollHeight-prevH;el.scrollTop=sst}}

function emptyH(){return'<div class="stack"><div class="empty"><h2>AI Chat Lite</h2><p>轻量、实用的 AI 对话工具。配置接口后即可开始。</p><div class="chips"><button class="chip" data-sug="帮我总结下面这段内容：">总结内容</button><button class="chip" data-sug="请解释这段代码：">解释代码</button><button class="chip" data-sug="帮我写一段产品介绍文案。">生成文案</button></div></div></div>'}

function vMsg(m){
  if(m.role==='tool_status')return'<div class="msg"><div class="msg-bd tbd">'+esc(m.content)+'</div></div>';
  var u=m.role==='user',cls='msg '+(u?'u':'a')+(m.error?' err':'')+(m.pending?' p':'');
  var pf=!u&&!m.pending&&!m.error&&m.latency!=null?'<span class="msg-pf">'+m.latency+'ms · '+(m.speed||0)+' 字/s</span>':'';
  var hide='';if(!m.pending){if(u)hide='<button class="msg-hide" data-hide="'+m.id+'">隐藏</button>';else if(m.role==='assistant'&&!m.error&&m.content?.trim())hide='<button class="msg-hide" data-ha="'+m.id+'">隐藏</button>'}
  var bd=m.pending&&!m.content?'<div class="typing"><span></span><span></span><span></span></div>':(u?'<p>'+esc(m.content).replace(/\n/g,'<br>')+'</p>':renderMd(m.content));
  return'<div class="'+cls+'" data-mid="'+m.id+'"><div class="msg-hd"><span class="msg-av">'+(u?'U':'AI')+'</span><span class="msg-nm">'+(u?'你':'AI')+'</span>'+hide+pf+'<span class="msg-tm">'+fmtT(m.time)+'</span></div><div class="msg-bd">'+bd+'</div></div>'}

function fmtT(v){try{return new Date(v).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}catch(e){return''}}

function applyCollapse(){var ch=240;
  U.msgs.querySelectorAll('.msg.u:not(.p)').forEach(function(el,i,arr){var bd=el.querySelector('.msg-bd');if(!bd)return;var id=el.dataset.mid;if(!id)return;
    if(bd.scrollHeight<=ch+50)return;var isExp=exp.has(id)||i===arr.length-1;
    if(!isExp)bd.classList.add('collapsed');var btn=document.createElement('button');btn.className='clp';btn.textContent=isExp?'收起':'展开全文';bd.parentNode.insertBefore(btn,bd.nextSibling)})}

function updStream(ai){var el=$('[data-mid="'+ai.id+'"]');if(!el){render();return}var bd=el.querySelector('.msg-bd');if(!bd)return;bd.innerHTML=renderMd(ai.content)}

// ====== 自动同步 ======
var syncTimer=null,syncing=false;

function scheduleSync(){if(!S.sy.t)return;clearTimeout(syncTimer);syncTimer=setTimeout(autoUpload,3000)}

async function autoUpload(){
  if(!S.sy.t||syncing)return;syncing=true;updateSyncStatus('syncing');
  try{var data={syncedAt:new Date().toISOString(),settings:read(K.s,null),conversations:read(K.c,[])};
    var url=S.sy.g?'https://api.github.com/gists/'+S.sy.g:'https://api.github.com/gists';
    var r=await fetch(url,{method:S.sy.g?'PATCH':'POST',headers:{Authorization:'token '+S.sy.t,'Content-Type':'application/json',Accept:'application/vnd.github.v3+json'},body:JSON.stringify({description:'AI Chat Lite Auto Backup',public:false,files:{'data.json':{content:JSON.stringify(data,null,2)}}})});
    if(!r.ok)throw new Error('HTTP '+r.status);var j=await r.json();if(!S.sy.g)S.sy.g=j.id;
    S.sy.at=new Date().toISOString();persistSy();updateSyncStatus('ok')}
  catch(e){updateSyncStatus('error');console.error('Sync failed:',e)}
  finally{syncing=false}}

async function autoDownload(){
  if(!S.sy.t||!S.sy.g)return;syncing=true;updateSyncStatus('syncing');
  try{var r=await fetch('https://api.github.com/gists/'+S.sy.g,{headers:{Authorization:'token '+S.sy.t,Accept:'application/vnd.github.v3+json'}});
    if(!r.ok)throw new Error('HTTP '+r.status);var gist=await r.json(),file=gist.files?.['data.json'];
    if(!file?.content)return;var data=JSON.parse(file.content);
    var remoteTime=new Date(data.syncedAt||0).getTime(),localTime=S.sy.at?new Date(S.sy.at).getTime():0;
    if(remoteTime>localTime){
      if(data.settings){write(K.s,data.settings);initProfiles(data.settings);S.s=S.p.find(function(x){return x.id===S.ap});persistSettings();fillForm();refreshUI()}
      if(data.conversations){write(K.c,data.conversations);S.c=normConv(data.conversations);S.ac=null;ensureConv();persistConv();renderConv();render()}
      S.sy.at=data.syncedAt;persistSy();updateSyncStatus('ok');status('已从云端恢复')}
    else{updateSyncStatus('ok');autoUpload()}}
  catch(e){updateSyncStatus('error');console.error('Download failed:',e)}
  finally{syncing=false}}

function updateSyncStatus(s){var map={off:'未配置',syncing:'同步中…',ok:'已同步',error:'同步失败'};
  U.sStat.textContent=map[s]||s;U.sStat.style.color=s==='error'?'var(--d)':s==='ok'?'#4ade80':'var(--t3)';
  U.syncBtn.style.color=s==='ok'?'#4ade80':s==='error'?'var(--d)':''}

function persistSy(){write(K.y,{t:S.sy.t,g:S.sy.g,at:S.sy.at})}
function updateSyncUI(){U.sStat.textContent=S.sy.at?fmtSy(S.sy.at):S.sy.t?'已配置':'未配置'}
function fmtSy(v){try{var d=new Date(v),diff=new Date()-d;if(diff<6e4)return'刚刚';if(diff<36e5)return Math.floor(diff/6e4)+' 分钟前';if(diff<864e5)return Math.floor(diff/36e5)+' 小时前';return d.toLocaleDateString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}catch(e){return'未知'}}
